name: Cloudflare deploy

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to Cloudflare
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 1ae8dd0fed233eb17d9013def4feced1
      VITE_FIREBASE_USE_EMULATOR: "false"
      VITE_FIREBASE_API_KEY: AIzaSyAAyIUmAzOPXSpg_DcAtqThmyC0rzIJIVg
      VITE_FIREBASE_AUTH_DOMAIN: vet-marinoni.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: vet-marinoni
      VITE_FIREBASE_APP_ID: 1:118050182814:web:031e026a1dc22ce1950d8f
      VITE_FIREBASE_APP_CHECK_SITE_KEY: 6LdlWfMsAAAAAMhT-73q0n32hhNdvLC7hvmAg6g9
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @vet/shared build
      - run: pnpm -F @vet/web build
      - name: Deploy
        working-directory: packages/web
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "Production deploy from main"
            npx wrangler deploy
          else
            echo "Preview version upload from $GITHUB_REF_NAME"
            npx wrangler versions upload --message "ci $GITHUB_REF_NAME @ $GITHUB_SHA"
          fi
